# cross-rs config — install libssl-dev:arm64 inside the docker image
# so `openssl-sys` (transitively via `wa-agent` → tokio-tungstenite
# native-tls) finds its system library on the aarch64 cross-build.
# We can't disable the native-tls path because `wa-agent` is an
# external crates.io dep we don't control; once it ships a `rustls`
# feature, this whole file goes away.

# Use a newer base image (jammy / 22.04) so libssl-dev:arm64 ships
# openssl 3.x. The default cross image is xenial (16.04) which only
# has 1.0.x and openssl-sys 0.9.114 refuses to link against that.
[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install --assume-yes libssl-dev:arm64 pkg-config",
]

[target.aarch64-unknown-linux-gnu.env]
PKG_CONFIG_ALLOW_CROSS = "1"
PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
