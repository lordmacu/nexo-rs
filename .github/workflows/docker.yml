name: docker

# Build and push the multi-arch Nexo container image to ghcr.io.
#
# Triggers:
#   - push to `main` (publishes `:edge` + `:sha-<short>`)
#   - push of a `v*` tag    (publishes `:latest`, `:vX.Y.Z`, `:vX.Y`, `:vX`)
#   - workflow_dispatch     (manual rebuild)
#
# Built archs: linux/amd64, linux/arm64 (matches Termux + most servers).
# Image is signed inline by `docker/build-push-action@v5` provenance —
# Cosign signing of the digest is layered on in Phase 27.3.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # for keyless OIDC if Cosign added later

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-{{sha}}
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Nexo
            org.opencontainers.image.description=Multi-agent Rust framework with NATS, MCP, and channel plugins
            org.opencontainers.image.url=https://github.com/lordmacu/nexo-rs
            org.opencontainers.image.documentation=https://lordmacu.github.io/nexo-rs/
            org.opencontainers.image.licenses=MIT OR Apache-2.0

      - name: Build + push (linux/amd64,linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache: shaves ~10 min off cold builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
