name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'crates/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.40
      MDBOOK_MERMAID_VERSION: 0.14.0
      # RUSTDOCFLAGS: -D warnings   # re-enable once public surface is clean
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install mdbook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Install mdbook-mermaid
        run: |
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build mdBook
        run: mdbook build docs

      - name: Sanity-check links in built book
        run: |
          # Fail the build if any generated page references a path under
          # docs/book that doesn't exist on disk. Lightweight alternative
          # to mdbook-linkcheck (which is incompatible with mdbook 0.5).
          set -euo pipefail
          missing=0
          while IFS= read -r -d '' html; do
            while read -r href; do
              [[ "$href" == "" || "$href" == "#"* || "$href" == *"://"* || "$href" == "/"* ]] && continue
              target_relative="${href%%#*}"
              [[ "$target_relative" == "" ]] && continue
              # Resolve relative to the referring file's directory.
              dir="$(dirname "$html")"
              cand="$dir/$target_relative"
              if [[ "$cand" == *"/" ]]; then
                cand="${cand}index.html"
              fi
              # Normalize trivial ../ segments.
              cand_resolved="$(python3 -c "import os,sys; print(os.path.normpath(sys.argv[1]))" "$cand")"
              if [[ ! -e "$cand_resolved" ]]; then
                echo "broken link: $html -> $href (resolved $cand_resolved)"
                missing=$((missing + 1))
              fi
            done < <(grep -Eoh 'href="[^"]+"' "$html" | sed 's/^href="//;s/"$//')
          done < <(find docs/book -name '*.html' -print0)
          if [[ "$missing" -gt 0 ]]; then
            echo "$missing broken local links"
            exit 1
          fi

      - name: Build rustdoc (cargo doc --workspace --no-deps)
        id: rustdoc
        continue-on-error: true
        run: cargo doc --workspace --no-deps --locked

      - name: Bundle rustdoc under docs/book/api/
        if: steps.rustdoc.outcome == 'success'
        run: |
          mkdir -p docs/book/api
          cp -R target/doc/* docs/book/api/
          # Landing redirect so /api/ points at the main crate's rustdoc index.
          printf '<meta http-equiv="refresh" content="0; url=agent/index.html">\n' \
            > docs/book/api/index.html

      - name: Note rustdoc skipped
        if: steps.rustdoc.outcome != 'success'
        run: |
          echo "::warning::rustdoc build failed; mdBook will be published without /api/"

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
