name: sbom

# Generate a CycloneDX SBOM from the Cargo.lock + workspace metadata
# and attach it to every release as `sbom-cyclonedx.json` (cargo deps)
# and `sbom-spdx.json` (full filesystem scan via syft, which catches
# anything cargo doesn't see — bundled binaries, generated assets).
#
# Triggers:
#   - workflow_run after `release` finishes successfully
#   - workflow_dispatch with a tag input (manual re-run)
#
# The Docker image already carries an SBOM via
# `docker/build-push-action@v5` with `sbom: true`; this workflow is
# the source-package equivalent for binary / .deb / .rpm releases.

on:
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build SBOMs for"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  sbom:
    name: build-and-attach-sbom
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      # ----- Cargo deps SBOM (CycloneDX) -----
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM from Cargo.lock
        run: |
          cargo cyclonedx --format json --all --output-pattern bom \
            --output-cdx -v
          # Single workspace-wide SBOM
          cp bom.json sbom-cyclonedx.json
          ls -la sbom-cyclonedx.json

      # ----- Filesystem SBOM (SPDX via syft) -----
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SPDX SBOM from workspace
        run: |
          syft . -o spdx-json=sbom-spdx.json
          ls -la sbom-spdx.json

      # ----- Sign both SBOMs with Cosign -----
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Sign SBOMs (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          for sbom in sbom-cyclonedx.json sbom-spdx.json; do
            cosign sign-blob --yes \
              --bundle "${sbom}.bundle" \
              "$sbom"
          done

      # ----- Upload to release -----
      - name: Attach SBOMs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            sbom-cyclonedx.json \
            sbom-cyclonedx.json.bundle \
            sbom-spdx.json \
            sbom-spdx.json.bundle
