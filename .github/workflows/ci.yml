name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # nexo-project-tracker::git tests grep `git log` for
          # "Phase 67.9" — needs full history, not the depth=1
          # shallow clone actions/checkout defaults to.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked
      # Phase 79.10 — exercise the gated config-self-edit tool too
      # so a regression in the gated body doesn't ship without
      # CI catching it. Single-threaded because the SQLite tests
      # share temp dirs.
      - run: cargo test --workspace --locked --features config-self-edit -- --test-threads=1

  cross-arm64:
    # Sanity-check that the workspace still compiles for aarch64 so
    # Termux-on-phone and Linux-ARM server deploys don't regress. Uses
    # `cross` (Docker-based cross-compile). Not required by branch
    # protection — it's a portability smoke test, not a release gate.
    name: cross-check aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64
      - name: Install cross
        run: cargo install cross --locked --version ^0.2
      - name: cross check --target aarch64-unknown-linux-gnu
        run: cross check --workspace --target aarch64-unknown-linux-gnu --locked
