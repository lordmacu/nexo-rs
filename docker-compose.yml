services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz | grep -q 'ok'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  nexo:
    # Default to the published GHCR image; `docker compose build` overrides
    # with a local build when iterating. Tag pinning recommended in prod
    # (e.g. `ghcr.io/lordmacu/nexo-rs:v0.1.1` instead of `:latest`).
    image: ghcr.io/lordmacu/nexo-rs:latest
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      nats:
        condition: service_healthy
    # Chrome (installed in the nexo image, launched by the browser
    # plugin) needs more than the default 64MB /dev/shm — otherwise
    # heavy pages crash with "session closed: OOPS, mmap for
    # /dev/shm/... failed".
    shm_size: "1gb"
    # Secrets are pulled in directly by the config loader via `${file:/run/secrets/...}`
    # placeholders in config/docker/llm.yaml — no shell export hack required.
    command: ["--config", "/app/config/docker"]
    environment:
      RUST_LOG: info
      AGENT_ENV: production
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./extensions:/app/extensions:ro
    secrets:
      - minimax_api_key
      - minimax_group_id
      - google_client_id
      - google_client_secret
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health | grep -q 'ok'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

secrets:
  minimax_api_key:
    file: ./secrets/minimax_api_key.txt
  minimax_group_id:
    file: ./secrets/minimax_group_id.txt

volumes:
  nats_data:
