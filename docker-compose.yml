services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz | grep -q 'ok'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  chrome:
    image: chromedp/headless-shell:latest
    healthcheck:
      test: ["CMD", "headless-shell", "--version"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 8s

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      nats:
        condition: service_healthy
      chrome:
        condition: service_healthy
    # Secrets are pulled in directly by the config loader via `${file:/run/secrets/...}`
    # placeholders in config/docker/llm.yaml — no shell export hack required.
    command: ["--config", "/app/config/docker"]
    environment:
      RUST_LOG: info
      AGENT_ENV: production
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./extensions:/app/extensions:ro
    secrets:
      - minimax_api_key
      - minimax_group_id
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health | grep -q 'ok'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

secrets:
  minimax_api_key:
    file: ./secrets/minimax_api_key.txt
  minimax_group_id:
    file: ./secrets/minimax_group_id.txt

volumes:
  nats_data:
