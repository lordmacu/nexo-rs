# release-plz workspace config. Defaults aim for: open a Release PR on every
# main push, bump only crates that actually changed (per-crate independent
# versions), keep every internal `path` dep version pin in sync, publish in
# topological order on merge.
#
# Reference: https://release-plz.ieni.dev/docs/config

[workspace]
# Per-crate independent versioning. Each crate carries its own literal
# `version = "X.Y.Z"` in its Cargo.toml — release-plz bumps only the crates
# that changed since their last `<name>-v<version>` tag, then rewrites every
# `nexo-X = { version = "...", path = "..." }` reference across the workspace
# (including the root bin's Cargo.toml) so internal pins stay aligned.
git_tag_name = "{{ package }}-v{{ version }}"
git_release_name = "{{ package }} v{{ version }}"

# Per-crate CHANGELOG.md (release-plz writes one inside each crate dir).
changelog_update = true

# Single batched Release PR for the whole workspace — easier to review than
# one PR per crate when many move together.
pr_name = "release: batched workspace bumps"
pr_branch_prefix = "release-plz/"

# Patch for `fix:`/`chore:`/`docs:`, minor for `feat:`, major for `!` or
# `BREAKING CHANGE:`. `cargo-semver-checks` upgrades a planned minor → major
# when the public API actually broke.
semver_check = true

# Publish settings shared by every crate.
publish_allow_dirty = false      # CI tree must be clean — no uncommitted WIP
publish_no_verify   = false      # full verify (compile) before upload
publish_timeout     = "30m"      # generous: cold cache builds can be slow

# The workspace bin (`nexo-rs`) is the last node in the topo order; release-plz
# already infers this from the dep graph, but we mark it explicitly so a crate
# rename never accidentally drops it from the publish set.
[[package]]
name = "nexo-rs"
publish = true
release = true

# To skip a crate, add:
#   [[package]]
#   name = "nexo-internal"
#   publish = false
