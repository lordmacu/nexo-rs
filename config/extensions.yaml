extensions:
  enabled: true
  search_paths:
  - ./extensions
  disabled:
  - template-rust
  allowlist: []
  ignore_dirs:
  - target
  - .git
  - node_modules
  - dist
  - .build
  max_depth: 3
  transport_defaults:
    nats:
      subject_prefix: ext
      call_timeout: 30s
      handshake_timeout: 10s
      heartbeat_interval: 15s
      heartbeat_grace_factor: 3
      shutdown_grace: 2s
  watch:
    enabled: false
    debounce_ms: 500
schema_version: 11
