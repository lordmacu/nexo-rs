whatsapp:
  enabled: true
  session_dir: ./data/workspace/ana/whatsapp/default
  media_dir: ./data/media/whatsapp
  acl:
    allow_list: []
    from_env: WA_AGENT_ALLOW
  behavior:
    ignore_chat_meta: true
    ignore_from_me: true
    ignore_groups: false
  rate_limit:
    global_per_sec: 2.0
    per_jid_per_sec: 1.0
    burst: 5
  bridge:
    response_timeout_ms: 30000
    on_timeout: noop
    apology_text: Sorry, I took too long to reply. Please try again.
  transcriber:
    enabled: false
    skill: whisper
    timeout_ms: 30000
  daemon:
    prefer_existing: true
  public_tunnel:
    enabled: false
    only_until_paired: true
