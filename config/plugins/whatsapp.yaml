# Single-account (legacy shape). For multi-account, use a sequence
# instead and give each entry an `instance:` label with a distinct
# `session_dir` (Signal protocol keys live per-dir — two accounts
# sharing a dir corrupt each other's crypto state).
#
# Multi-account example:
# whatsapp:
#   - session_dir: ./data/whatsapp/biz
#     instance: biz
#     acl: { allow_list: ["573001111111@s.whatsapp.net"] }
#   - session_dir: ./data/whatsapp/support
#     instance: support
#     acl: { allow_list: ["573002222222@s.whatsapp.net"] }
#
# Multi-account in a single process is supported end-to-end. Each
# instance gets its own `FileStore` rooted at `<session_dir>/.whatsapp-rs`
# (via `whatsapp_rs::Client::new_in_dir`) so Signal keys never collide.
# Topics route per-instance: `plugin.inbound.whatsapp.<instance>` and
# `plugin.outbound.whatsapp.<instance>`. Agents pin themselves with
# `inbound_bindings: [{plugin: whatsapp, instance: X}]`.
whatsapp:
  enabled: true
  session_dir: ./data/whatsapp-session
  media_dir: ./data/media/whatsapp
  acl:
    allow_list: []
    from_env: WA_AGENT_ALLOW
  behavior:
    ignore_chat_meta: true
    ignore_from_me: true
    ignore_groups: false
  rate_limit:
    global_per_sec: 2.0
    per_jid_per_sec: 1.0
    burst: 5
  bridge:
    response_timeout_ms: 30000
    on_timeout: noop
    apology_text: Sorry, I took too long to reply. Please try again.
  transcriber:
    enabled: false
    skill: whisper
    timeout_ms: 30000
  daemon:
    prefer_existing: true
  # Spawn a Cloudflare Tunnel on boot so /whatsapp/pair is reachable
  # from a public *.trycloudflare.com URL without VPN / port-forward.
  # Auto-downloads cloudflared for the host platform on first run.
  public_tunnel:
    enabled: true
    only_until_paired: true
