mcp:
  enabled: true
  session_ttl: 30m
  idle_reap_interval: 60s
  connect_timeout: 30s
  initialize_timeout: 10s
  call_timeout: 30s
  shutdown_grace: 3s
  servers: {}
  watch:
    enabled: false
    debounce_ms: 500
  context:
    passthrough: false
  sampling:
    enabled: false
    global_max_tokens_cap: 4096
    deny_servers: []
    per_server: {}
schema_version: 11
