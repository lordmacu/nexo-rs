providers:
  minimax:
    api_key: ${MINIMAX_API_KEY:-}
    group_id: ${MINIMAX_GROUP_ID:-}
    base_url: https://api.minimax.io/v1
    rate_limit:
      requests_per_second: 2.0
      quota_alert_threshold: 100000
  anthropic:
    api_key: ${ANTHROPIC_API_KEY:-}
    base_url: https://api.anthropic.com
    rate_limit:
      requests_per_second: 2.0
      quota_alert_threshold: 100000
    auth:
      mode: oauth_bundle
      bundle: ./secrets/anthropic_oauth.json
  # DeepSeek is OpenAI-compatible — only api_key is required.
  # base_url defaults to https://api.deepseek.com/v1 when blank.
  # Models: deepseek-chat (general), deepseek-reasoner (reasoning).
  deepseek:
    api_key: ${DEEPSEEK_API_KEY:-}
    base_url: ""
    rate_limit:
      requests_per_second: 2.0
      quota_alert_threshold: 100000
retry:
  max_attempts: 5
  initial_backoff_ms: 1000
  max_backoff_ms: 60000
  backoff_multiplier: 2.0
