mcp_server:
  enabled: false
  name: agent
  allowlist: []
  expose_proxies: false
  auth_token_env: null
  expose_tools: []
  expose_denied_tools: []
  denied_tools_profile:
    enabled: false
    require_auth: true
    require_delegate_allowlist: true
    require_remote_trigger_targets: true
    allow:
      heartbeat: false
      delegate: false
      remote_trigger: false
  autonomous_worker:
    enabled: false
    tick_secs: 60
  http:
    enabled: false
    bind: 127.0.0.1:7575
    auth_token_env: null
    allow_origins:
    - http://localhost
    - http://127.0.0.1
    body_max_bytes: 1048576
    max_in_flight: 500
    per_ip_rate_limit:
      rps: 60
      burst: 120
    request_timeout_secs: 30
    session_idle_timeout_secs: 300
    session_max_lifetime_secs: 86400
    max_sessions: 1000
    sse_keepalive_secs: 15
    sse_max_age_secs: 600
    sse_buffer_size: 256
    enable_legacy_sse: false
schema_version: 11
