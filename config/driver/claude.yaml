# Phase 67.1 reference config — loader wires this up in 67.4.
#
# `binary`:
#   - omit / set to `null` → `which("claude")` resolves at runtime
#   - absolute path        → spawn that exact binary
#
# Setting `permission_prompt_tool` enables human-in-the-loop approval
# of every Edit/Bash/Write via the MCP server (Phase 67.3 supplies it).

binary: claude

default_args:
  output_format: stream_json
  permission_prompt_tool: mcp__nexo-driver__permission_prompt
  allowed_tools:
    - Read
    - Grep
    - Glob
    - LS
    - WebFetch
  disallowed_tools: []
  model: null

# Path to MCP servers config (Phase 67.3 owns this file).
mcp_config: null

# Grace before SIGKILL after SIGTERM.
forced_kill_after: 1s

# Per-turn wall-clock cap. The goal-level budget (Phase 67.0)
# governs the cumulative budget across turns.
turn_timeout: 10m

# Phase 67.2 — where Claude session bindings get persisted so the
# next turn can `--resume <id>` after a daemon restart. Loader is
# wired up in Phase 67.4; the `binding_store:` section is documented
# here ahead of time.
#
# `kind`: `sqlite` (file-backed) or `memory` (process-local; bindings
# are lost on restart — only useful for tests/dev).
#
# `idle_ttl`: a binding whose `last_active_at` is older than this is
# treated as expired (`get` returns `None`). `0s` or absent means
# "no idle filter".
#
# `max_age`: a binding whose `created_at + max_age` is in the past is
# expired regardless of activity. Caps how long Anthropic-side
# session ids remain trusted.
#
# Both filters apply on top of `last_session_invalid` — invalidated
# bindings are always hidden from `get`.
binding_store:
  kind: sqlite
  path: ${NEXO_DRIVER_DB:-/var/lib/nexo-rs/driver.db}
  idle_ttl: 24h
  max_age: 30d
