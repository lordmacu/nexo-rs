# Phase 67.1 reference config — loader wires this up in 67.4.
#
# `binary`:
#   - omit / set to `null` → `which("claude")` resolves at runtime
#   - absolute path        → spawn that exact binary
#
# Setting `permission_prompt_tool` enables human-in-the-loop approval
# of every Edit/Bash/Write via the MCP server (Phase 67.3 supplies it).

binary: claude

default_args:
  output_format: stream_json
  permission_prompt_tool: mcp__nexo-driver__permission_prompt
  allowed_tools:
    - Read
    - Grep
    - Glob
    - LS
    - WebFetch
  disallowed_tools: []
  model: null

# Path to MCP servers config (Phase 67.3 owns this file).
mcp_config: null

# Grace before SIGKILL after SIGTERM.
forced_kill_after: 1s

# Per-turn wall-clock cap. The goal-level budget (Phase 67.0)
# governs the cumulative budget across turns.
turn_timeout: 10m

# Phase 67.2 — where Claude session bindings get persisted so the
# next turn can `--resume <id>` after a daemon restart. Loader is
# wired up in Phase 67.4; the `binding_store:` section is documented
# here ahead of time.
#
# `kind`: `sqlite` (file-backed) or `memory` (process-local; bindings
# are lost on restart — only useful for tests/dev).
#
# `idle_ttl`: a binding whose `last_active_at` is older than this is
# treated as expired (`get` returns `None`). `0s` or absent means
# "no idle filter".
#
# `max_age`: a binding whose `created_at + max_age` is in the past is
# expired regardless of activity. Caps how long Anthropic-side
# session ids remain trusted.
#
# Both filters apply on top of `last_session_invalid` — invalidated
# bindings are always hidden from `get`.
binding_store:
  kind: sqlite
  path: ${NEXO_DRIVER_DB:-/var/lib/nexo-rs/driver.db}
  idle_ttl: 24h
  max_age: 30d

# Phase 67.3 — gating Claude tool calls via the MCP `permission_prompt`
# server. The driver loop (Phase 67.4) spawns
# `nexo-driver-permission-mcp` per goal and points Claude Code at it
# with `--permission-prompt-tool mcp__nexo-driver__permission_prompt`.
#
# `socket`: Unix-domain socket the bin uses to ask the daemon for a
# decision. Phase 67.4 wires the daemon side; 67.3 ships only the bin
# in `--allow-all` / `--deny-all` placeholder mode.
#
# `decision_timeout`: how long the bin waits for a decider response
# before failing closed (returning a deny to Claude).
#
# `session_cache_max`: hard cap on the in-process AllowSession cache
# so a runaway turn cannot blow up RSS.
permission:
  socket: ${NEXO_DRIVER_DECISION_SOCKET:-/run/nexo-rs/driver.sock}
  decision_timeout: 30s
  session_cache_max: 1024
  decider:
    kind: llm
    provider: minimax
    model: ${MINIMAX_MODEL:-M2.5}
    max_tokens: 256
    system_prompt_path: ${NEXO_DRIVER_PROMPT:-}

# Phase 67.4 — workspace where each goal runs. Phase 67.6 added the
# git-worktree mode: when `git.enabled=true`, each goal gets its own
# branch `nexo-driver/<goal_id>` off `source_repo`, with per-turn
# checkpoint commits the operator can `nexo-driver rollback` to.
workspace:
  root: ${NEXO_DRIVER_WORKSPACE_ROOT:-/tmp/claude-runs}
  cleanup_on_done: false
  git:
    enabled: false
    source_repo: ${NEXO_DRIVER_SOURCE_REPO:-}
    base_ref: HEAD

driver:
  bin_path: ${NEXO_DRIVER_BIN:-/usr/local/bin/nexo-driver-permission-mcp}
  emit_nats_events: true

# Phase 67.5 — DefaultAcceptanceEvaluator runs each AcceptanceCriterion
# of the goal in declaration order: shell-command exit-code + optional
# stdout regex, file-match with workspace path-traversal guard, custom
# verifiers (built-ins: no_paths_touched, git_clean).
acceptance:
  default_shell_timeout: 5m
  evidence_byte_limit: 4096
