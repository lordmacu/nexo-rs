short_term:
  max_history_turns: 50
  session_ttl: 24h
long_term:
  backend: sqlite
  sqlite:
    path: ./data/memory.db
vector:
  enabled: false
  backend: sqlite-vec
  default_recall_mode: keyword
  embedding:
    provider: http
    base_url: http://localhost:11434/v1
    model: nomic-embed-text
    timeout_secs: 30
    dimensions: 768
schema_version: 11
