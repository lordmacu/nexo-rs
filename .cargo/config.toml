[build]
# lld not available — remove flag if lld is installed later for faster builds
# shared target dir — all extensions compile tokio/serde/etc once, not N times
target-dir = "/home/familia/chat/proyecto/target"

[profile.dev]
# faster compile, slower binary — fine for development
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
