[package]
name = "ventas-etb"
description = "Reference SaaS-shaped microapp — telecom sales workflow (planes, coverage, lead capture). Phase 83.8."
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Cristian Garcia <informacion@cristiangarcia.co>"]
publish = false

[[bin]]
name = "ventas-etb"
path = "src/main.rs"

[dependencies]
nexo-microapp-sdk          = { path = "../../crates/microapp-sdk", features = ["outbound"] }
nexo-compliance-primitives = { path = "../../crates/compliance-primitives" }

anyhow      = "1"
async-trait = "0.1"
chrono      = { version = "0.4", features = ["serde"] }
sqlx        = { version = "0.8", features = ["sqlite", "runtime-tokio", "chrono"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "1"
tokio       = { version = "1", features = ["macros", "rt-multi-thread", "io-util", "io-std", "sync"] }
tracing     = "0.1"
parking_lot = "0.12"

[dev-dependencies]
tempfile = "3"
