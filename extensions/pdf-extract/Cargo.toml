[package]
name = "pdf-extract-ext"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pdf-extract"
path = "src/main.rs"

[lib]
name = "pdf_extract_ext"
path = "src/lib.rs"

[workspace]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pdf-extract = "0.7"

[dev-dependencies]
tokio    = { version = "1", features = ["rt-multi-thread", "macros"] }
tempfile = "3"
