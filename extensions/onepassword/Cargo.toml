[package]
name = "onepassword-ext"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "onepassword"
path = "src/main.rs"

[lib]
name = "onepassword_ext"
path = "src/lib.rs"

[workspace]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
regex = "1"

[dev-dependencies]
tempfile = "3"
serial_test = "3"
