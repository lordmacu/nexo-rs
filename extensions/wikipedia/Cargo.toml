[package]
name = "wikipedia-ext"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "wikipedia"
path = "src/main.rs"

[lib]
name = "wikipedia_ext"
path = "src/lib.rs"

[workspace]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
once_cell = "1"
urlencoding = "2"

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serial_test = "3"
