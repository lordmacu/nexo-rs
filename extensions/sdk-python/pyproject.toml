[project]
name = "nexo-plugin-sdk"
version = "0.1.0"
description = "Python SDK for nexo subprocess plugins (Phase 31.4)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT OR Apache-2.0" }
authors = [{ name = "Cristian Garcia", email = "informacion@cristiangarcia.co" }]
dependencies = [
    "tomli; python_version < '3.11'",
]

[project.urls]
Homepage = "https://github.com/lordmacu/nexo-rs"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["nexo_plugin_sdk*"]
