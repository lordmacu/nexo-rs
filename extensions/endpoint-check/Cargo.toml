[package]
name = "endpoint-check-ext"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "endpoint-check"
path = "src/main.rs"

[lib]
name = "endpoint_check_ext"
path = "src/lib.rs"

[workspace]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
rustls = "0.23"
rustls-pemfile = "2"
webpki-roots = "0.26"
x509-parser = "0.16"
once_cell = "1"
url = "2"
ext-common = { path = "../_common" }

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
serial_test = "3"
