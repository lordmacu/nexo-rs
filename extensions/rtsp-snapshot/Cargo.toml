[package]
name = "rtsp-snapshot-ext"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rtsp-snapshot"
path = "src/main.rs"

[lib]
name = "rtsp_snapshot_ext"
path = "src/lib.rs"

[workspace]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"

[dev-dependencies]
tempfile = "3"
serial_test = "3"
