# Phase 31.4 — out-of-tree subprocess plugin template (Python).
#
# COPY-AND-MODIFY workflow:
# 1. Copy this entire `extensions/template-plugin-python/`
#    directory into a new repo of your own.
# 2. Edit this manifest: pick a unique `plugin.id` (regex
#    `^[a-z][a-z0-9_]{0,31}$`).
# 3. Implement your plugin's logic in `src/main.py`.
# 4. Pin SDK + deps in `requirements.txt`.
# 5. Tag a release `v<semver>` and let `.github/workflows/release.yml`
#    publish a `<id>-<version>-noarch.tar.gz` to the GitHub Release.
#
# The asset convention is identical to the Rust template; only
# the target string `noarch` differs (Python plugins ship a
# single tarball that runs on every operator host).

[plugin]
id = "template_plugin_python"
version = "0.1.0"
name = "Template Plugin (Python)"
description = "Skeleton out-of-tree subprocess plugin in Python."
min_nexo_version = ">=0.1.0"

[plugin.requires]
nexo_capabilities = ["broker"]

[[plugin.channels.register]]
kind = "template_echo_py"
adapter = "TemplateEchoAdapter"

# `entrypoint.command` points at the bash launcher script that
# the publish workflow drops into `bin/<id>` at pack time. The
# launcher sets PYTHONPATH to the vendored deps and exec's
# `python3 lib/plugin/main.py`.
[plugin.entrypoint]
command = "./bin/template_plugin_python"
args = []
