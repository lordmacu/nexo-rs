[package]
name = "nexo-plugin-whatsapp"
description   = "WhatsApp channel plugin (wa-agent + Signal Protocol) for Nexo agents."
version       = "0.1.1"
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
authors       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
documentation = { workspace = true }
readme        = "README.md"
keywords      = { workspace = true }
categories    = { workspace = true }
[dependencies]
nexo-core = { version = "0.1.1", path = "../../core" }
nexo-broker = { version = "0.1.1", path = "../../broker" }
nexo-config = { version = "0.1.1", path = "../../config" }
nexo-llm = { version = "0.1.1", path = "../../llm" }
nexo-auth = { version = "0.1.1", path = "../../auth" }
nexo-pairing = { version = "0.1.2", path = "../../pairing", default-features = false }
nexo-plugin-manifest = { version = "0.1.0", path = "../../plugin-manifest" }
toml = "0.8"

wa-agent = "0.1.1"

tokio       = { workspace = true }
tokio-util  = { workspace = true }
async-trait = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_yaml  = { workspace = true }
anyhow      = { workspace = true }
thiserror   = { workspace = true }
tracing     = { workspace = true }
uuid        = { workspace = true, features = ["v5"] }
chrono      = { workspace = true }
dashmap     = { workspace = true }
reqwest     = { workspace = true }
base64      = { workspace = true }
futures     = { workspace = true }
qrcode      = { version = "0.14", default-features = false }
image       = { version = "0.25", default-features = false, features = ["png"] }

[features]
# E2E live WhatsApp test; skipped by default (requires paired device).
live-wa = []

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_yaml = { workspace = true }
nexo-config = { version = "0.1.1", path = "../../config" }
nexo-broker = { version = "0.1.1", path = "../../broker" }
nexo-core = { version = "0.1.1", path = "../../core" }
dashmap = { workspace = true }
uuid = { workspace = true, features = ["v4", "v5", "serde"] }
chrono = { workspace = true }
