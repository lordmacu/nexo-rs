[package]
name = "agent-plugin-whatsapp"
version = "0.1.0"
edition = "2021"

[dependencies]
agent-core   = { path = "../../core" }
agent-broker = { path = "../../broker" }
agent-config = { path = "../../config" }
agent-llm    = { path = "../../llm" }
agent-auth   = { path = "../../auth" }

wa-agent = "0.1.1"

tokio       = { workspace = true }
tokio-util  = { workspace = true }
async-trait = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_yaml  = { workspace = true }
anyhow      = { workspace = true }
thiserror   = { workspace = true }
tracing     = { workspace = true }
uuid        = { workspace = true, features = ["v5"] }
chrono      = { workspace = true }
dashmap     = { workspace = true }
reqwest     = { workspace = true }
base64      = { workspace = true }
futures     = { workspace = true }
qrcode      = { version = "0.14", default-features = false }
image       = { version = "0.25", default-features = false, features = ["png"] }

[features]
# E2E live WhatsApp test; skipped by default (requires paired device).
live-wa = []

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_yaml = { workspace = true }
agent-config = { path = "../../config" }
agent-broker = { path = "../../broker" }
agent-core = { path = "../../core" }
dashmap = { workspace = true }
uuid = { workspace = true, features = ["v4", "v5", "serde"] }
chrono = { workspace = true }
