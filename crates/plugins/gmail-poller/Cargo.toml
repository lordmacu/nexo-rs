[package]
name    = "agent-plugin-gmail-poller"
version = "0.1.0"
edition = "2021"

[dependencies]
# Background task that polls Gmail at a fixed interval, extracts data
# from matching emails via regex, and pushes outbound events to any
# channel plugin (whatsapp, telegram, …). No LLM involvement in the
# hot path — deterministic and cheap to run every minute.
agent-broker         = { path = "../../broker" }
agent-plugin-google  = { path = "../google" }
anyhow               = { workspace = true }
base64               = { workspace = true }
regex                = "1"
serde                = { workspace = true }
serde_json           = { workspace = true }
serde_yaml           = { workspace = true }
tokio                = { workspace = true, features = ["rt-multi-thread", "macros", "time", "sync"] }
tracing              = { workspace = true }
uuid                 = { workspace = true, features = ["v4"] }
