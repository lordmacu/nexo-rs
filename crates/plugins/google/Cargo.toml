[package]
name    = "nexo-plugin-google"
description   = "Google APIs (Gmail, Calendar, Drive) tool plugin for Nexo agents."
version       = "0.1.1"
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
authors       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
documentation = { workspace = true }
readme        = "README.md"
keywords      = { workspace = true }
categories    = { workspace = true }
[dependencies]
# Native Google OAuth client + the 4 google_* tools. Lives outside of
# nexo-core so the runtime doesn't ship the reqwest OAuth machinery
# when an agent has no `google_auth:` block.
nexo-core = { version = "0.1.1", path = "../../core" }
nexo-llm = { version = "0.1.1", path = "../../llm" }
nexo-resilience = { version = "0.1.1", path = "../../resilience" }
anyhow      = { workspace = true }
async-trait = { workspace = true }
chrono      = { workspace = true }
rand        = "0.8"
reqwest     = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_urlencoded = "0.7"
tokio       = { workspace = true }
tracing     = { workspace = true }
arc-swap    = { workspace = true }

[dev-dependencies]
tempfile    = "3"
