[package]
name    = "agent-plugin-google"
version = "0.1.0"
edition = "2021"

[dependencies]
# Native Google OAuth client + the 4 google_* tools. Lives outside of
# agent-core so the runtime doesn't ship the reqwest OAuth machinery
# when an agent has no `google_auth:` block.
agent-core  = { path = "../../core" }
agent-llm   = { path = "../../llm" }
anyhow      = { workspace = true }
async-trait = { workspace = true }
chrono      = { workspace = true }
rand        = "0.8"
reqwest     = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_urlencoded = "0.7"
tokio       = { workspace = true }
tracing     = { workspace = true }
