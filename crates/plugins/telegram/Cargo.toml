[package]
name = "nexo-plugin-telegram"
description   = "Telegram bot channel plugin for Nexo agents."
version       = "0.1.1"
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
authors       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
documentation = { workspace = true }
readme        = "README.md"
keywords      = { workspace = true }
categories    = { workspace = true }
[dependencies]
tokio        = { workspace = true }
tokio-util   = { workspace = true, features = ["io"] }
serde        = { workspace = true }
serde_json   = { workspace = true }
anyhow       = { workspace = true }
async-trait  = { workspace = true }
tracing      = { workspace = true }
uuid         = { workspace = true, features = ["v5"] }
reqwest      = { workspace = true, features = ["multipart"] }
dashmap      = { workspace = true }
futures-util = "0.3"
chrono       = { workspace = true }
nexo-broker = { version = "0.1.1", path = "../../broker" }
nexo-core = { version = "0.1.1", path = "../../core" }
nexo-config = { version = "0.1.1", path = "../../config" }
nexo-llm = { version = "0.1.1", path = "../../llm" }
nexo-auth = { version = "0.1.1", path = "../../auth" }
nexo-pairing = { version = "0.1.2", path = "../../pairing", default-features = false }

[dev-dependencies]
wiremock     = "0.6"
serial_test  = "3"
tempfile     = "3"
