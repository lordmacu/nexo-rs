[package]
name = "nexo-plugin-email"
description   = "Email (IMAP/SMTP) channel plugin for Nexo agents."
version       = "0.1.1"
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
authors       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
documentation = { workspace = true }
readme        = "README.md"
keywords      = { workspace = true }
categories    = { workspace = true }
[dependencies]
tokio        = { workspace = true }
tokio-util   = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
serde_bytes  = { workspace = true }
anyhow       = { workspace = true }
async-trait  = { workspace = true }
tracing      = { workspace = true }
chrono       = { workspace = true }
dashmap      = { workspace = true }
sqlx         = { workspace = true }
rand         = { workspace = true }
nexo-broker     = { version = "0.1.1", path = "../../broker" }
nexo-core       = { version = "0.1.1", path = "../../core" }
nexo-config     = { version = "0.1.1", path = "../../config" }
nexo-auth       = { version = "0.1.1", path = "../../auth" }
nexo-resilience = { version = "0.1.1", path = "../../resilience" }

[dev-dependencies]
serde_yaml   = { workspace = true }
tempfile     = "3"
tokio        = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
