# Phase 81.12.d — DORMANT until Phase 81.12.e ships the boot wire flip.
#
# This manifest is part of the plugin crate and parsed at compile-time
# via `include_str!` in `EmailPlugin::new()`. Operators MUST NOT add
# this directory to `plugins.discovery.search_paths` until Phase 81.12.e
# (see proyecto/PHASES-curated.md). Doing so today would cause the
# discovery walker to pick up the plugin while the legacy registration
# in `src/main.rs:1914-1937` still constructs `EmailPlugin` via
# `PluginRegistry::register_arc`. The result is harmless on its own
# (factory_registry passed to wire_plugin_registry is `None`, so the
# discovered plugin records `InitOutcome::NoHandle`) — but it's
# dead noise.
#
# 81.12.e moves this file (or a symlink) into the operator's discovery
# search path AND replaces the legacy block with
# `factory_registry.register("email", email_plugin_factory(cfg, creds, google, data_dir))`.
#
# Unlike telegram / whatsapp, email is a SINGLE plugin instance that
# manages N internal accounts via `EmailPluginConfig.accounts`. There is
# no per-instance `registry_name` divergence — `manifest().plugin.id`
# and `Plugin::name()` agree at all times.

[plugin]
id = "email"
version = "0.1.1"
name = "Email"
description = "Email (IMAP/SMTP) channel for nexo agents — multi-account internal."
min_nexo_version = ">=0.1.0"

[plugin.requires]
nexo_capabilities = ["broker"]
