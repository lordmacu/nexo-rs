[package]
name        = "nexo-tool-meta"
description = "Wire-shape types shared between the Nexo agent runtime and any third-party microapp that consumes its events."
version       = "0.1.0"
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
authors       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
documentation = { workspace = true }
readme        = "README.md"
keywords      = ["nexo", "agent", "microapp", "webhook", "wire-types"]
categories    = ["api-bindings", "data-structures"]

[lints]
workspace = true

[dependencies]
serde      = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid       = { workspace = true }
chrono     = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
