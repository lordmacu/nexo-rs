[package]
name = "nexo-setup"
description   = "Setup wizard, capability inventory, and doctor command for Nexo."
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
authors       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
documentation = { workspace = true }
readme        = "README.md"
keywords      = { workspace = true }
categories    = { workspace = true }
[dependencies]
nexo-config = { version = "0.1.1", path = "../config" }
nexo-core = { version = "0.1.1", path = "../core" }
nexo-auth = { version = "0.1.1", path = "../auth" }
anyhow       = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
serde_yaml   = { workspace = true }
tracing      = { workspace = true }
thiserror    = { workspace = true }
dialoguer    = { version = "0.11" }
console      = "0.15"
tempfile     = "3"
reqwest      = { workspace = true }
tokio        = { workspace = true, features = ["rt-multi-thread", "macros"] }
base64       = { workspace = true }
sha2         = { workspace = true }
uuid         = { workspace = true, features = ["v4"] }
chrono       = { workspace = true }
rand         = "0.8"
indicatif    = "0.17"
nexo-plugin-whatsapp = { version = "0.1.1", path = "../plugins/whatsapp" }
nexo-plugin-google = { version = "0.1.1", path = "../plugins/google" }
