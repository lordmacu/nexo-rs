[package]
name = "nexo-poller"
description   = "Generic polling runtime: cron schedules, retries, ack semantics."
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
authors       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
documentation = { workspace = true }
readme        = { workspace = true }
keywords      = { workspace = true }
categories    = { workspace = true }
[dependencies]
nexo-broker = { version = "0.1.0", path = "../broker" }
nexo-config = { version = "0.1.0", path = "../config" }
nexo-auth = { version = "0.1.0", path = "../auth" }
nexo-resilience = { version = "0.1.0", path = "../resilience" }
nexo-llm = { version = "0.1.0", path = "../llm" }

tokio        = { workspace = true }
async-trait  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
serde_yaml   = { workspace = true }
anyhow       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
chrono       = { workspace = true }
arc-swap     = { workspace = true }
dashmap      = { workspace = true }
sqlx         = { workspace = true }
reqwest      = { workspace = true }
tokio-util   = { workspace = true }
cron         = "0.12"
humantime    = { workspace = true }
regex        = "1"
base64       = { workspace = true }
nexo-plugin-google = { version = "0.1.0", path = "../plugins/google" }

[features]
default = []
cron-tz = ["chrono-tz"]

[dependencies.chrono-tz]
version = "0.9"
optional = true

[dev-dependencies]
tempfile = "3"
tokio    = { workspace = true, features = ["macros", "rt-multi-thread", "test-util"] }
