# Phase 27.1 + 27.2 â€” cargo-dist baseline + GH Actions release workflow.
#
# Produces release tarballs of the `nexo` bin for the 2 musl Linux
# targets below whenever `dist build --tag nexo-rs-v<version>` runs
# locally, and whenever the GH release workflow at
# `.github/workflows/release.yml` (Phase 27.2) fires on a tag push.
# Termux ships separately as a `.deb` produced by
# `packaging/termux/build.sh` (cross-compiled to aarch64-linux-android,
# bionic libc â€” incompatible with musl); the workflow runs that script
# in its own job and uploads the `.deb` to the same GH release.
#
# Apple targets (`x86_64`/`aarch64-apple-darwin`) and Windows
# (`x86_64-pc-windows-msvc`) are deliberately NOT shipped â€” see the
# Phase 27.2 spec. Re-enabling: add the targets back here, restore
# matrix entries in `release.yml`, and revive `packaging/homebrew/`.
#
# Keeps release-plz as the source of truth for version bumps +
# crates.io publish + per-crate CHANGELOG; cargo-dist only owns the
# binary side.
#
# Regenerate via `dist init --yes` after a `cargo-dist-version` bump,
# then re-run `make dist-check` before committing.

[workspace]
members = ["cargo:."]

[dist]
# Pin matches the locally-installed `dist` binary version. Bump
# together with `dist init --yes`.
cargo-dist-version = "0.31.0"

# `dist generate` consults this when emitting the GH workflow. Today
# our hand-rolled `release.yml` (Phase 27.2) is the canonical workflow;
# `dist generate` is used as a sanity check during config bumps.
ci = "github"

# `curl | sh` installer only. PowerShell / Homebrew / npm / msi
# installers DROPPED with the Apple/Windows targets â€” re-add when
# those targets are revived.
installers = ["shell"]

# 2-target shippable matrix. Both linked statically against musl via
# `cargo-zigbuild`. Termux (`aarch64-linux-android`, bionic) is built
# OUTSIDE cargo-dist by `packaging/termux/build.sh`.
targets = [
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
]

# Each crate that opted in via `[package.metadata.dist] dist = true`
# gets its own build job per target â€” keeps the matrix small (only
# the root crate ships a bin in release tarballs; every other
# bin-bearing crate carries `dist = false`).
precise-builds = true

# Linux musl rebuilds via zigbuild; both targets honour this.
linux-build-tool = "cargo-zigbuild"

# Files included verbatim in every tarball (next to the bin).
include = ["LICENSE-MIT", "LICENSE-APACHE", "README.md"]

# Tag scheme matches release-plz's `git_tag_name = "{{ package }}-v{{ version }}"`.
tag-namespace = "nexo-rs"

# Local `make dist-check` is allowed to run with a dirty worktree;
# CI must not.
allow-dirty = ["ci"]

# Shell installer drops the bin in `$CARGO_HOME/bin`. Operators
# without cargo can override with `--install-dir=...`.
install-path = "CARGO_HOME"

# `axoupdater` (`nexo self-update`) is Phase 27.10 deferred â€” leave
# off until that wiring lands.
install-updater = false
