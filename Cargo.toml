[workspace]
members = [
    "crates/core",
    "crates/broker",
    "crates/llm",
    "crates/memory",
    "crates/config",
    "crates/extensions",
    "crates/mcp",
    "crates/resilience",
    "crates/taskflow",
    "crates/plugins/browser",
    "crates/plugins/whatsapp",
    "crates/plugins/telegram",
    "crates/plugins/email",
    "crates/plugins/google",
    "crates/plugins/gmail-poller",
    "crates/setup",
    "crates/tunnel",
    "crates/auth",
    "crates/poller",
]
# Keep standalone extension templates out of the agent workspace so they don't
# inherit our deps or lockfile. Users copy them verbatim and build separately.
exclude = [
    "extensions/template-rust",
]
resolver = "2"

[package]
name = "agent"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[[bin]]
name = "agent"
path = "src/main.rs"

[[bin]]
name = "browser-test"
path = "src/browser_test.rs"

[[bin]]
name = "integration-browser-check"
path = "src/integration_browser_check.rs"

[[bin]]
name = "llm_smoke"
path = "src/bin/llm_smoke.rs"

[workspace.dependencies]
tokio              = { version = "1", features = ["full"] }
serde              = { version = "1", features = ["derive"] }
serde_json         = "1"
anyhow             = "1"
thiserror          = "1"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-nats         = "0.35"
reqwest            = { version = "0.12", features = ["rustls-tls", "json", "stream", "cookies"] }
sqlx               = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
tokio-tungstenite  = "0.21"
uuid               = { version = "1", features = ["v4", "serde"] }
chrono             = { version = "0.4", features = ["serde"] }
config             = "0.14"
serde_yaml         = "0.9"
async-trait        = "0.1"
dashmap            = "6"
humantime          = "2"
tokio-util         = { version = "0.7", features = ["rt"] }
bytes              = "1"
futures            = "0.3"
base64             = "0.22"
sha2               = "0.10"
hex                = "0.4"
sqlite-vec         = "0.1"
lru                = "0.12"
libsqlite3-sys     = "0.30"
git2               = { version = "0.19", default-features = false }
notify             = "6"
notify-debouncer-full = "0.3"
arc-swap           = "1"
eventsource-stream = "0.2"

[dependencies]
tokio               = { workspace = true }
anyhow              = { workspace = true }
async-nats          = { workspace = true }
futures             = { workspace = true }
uuid                = { workspace = true }
rand                = "0.8"
rust-embed          = { version = "8", features = ["include-exclude"] }
sha2                = { workspace = true }
agent-plugin-browser = { path = "crates/plugins/browser" }
agent-plugin-whatsapp = { path = "crates/plugins/whatsapp" }
agent-plugin-telegram = { path = "crates/plugins/telegram" }
agent-plugin-google   = { path = "crates/plugins/google" }
agent-plugin-gmail-poller = { path = "crates/plugins/gmail-poller" }
agent-setup          = { path = "crates/setup" }
agent-tunnel         = { path = "crates/tunnel" }
agent-auth          = { path = "crates/auth" }
agent-poller        = { path = "crates/poller" }
agent-config        = { path = "crates/config" }
agent-broker        = { path = "crates/broker" }
agent-core          = { path = "crates/core" }
agent-extensions    = { path = "crates/extensions" }
agent-llm           = { path = "crates/llm" }
agent-mcp           = { path = "crates/mcp" }
agent-memory        = { path = "crates/memory" }
agent-taskflow      = { path = "crates/taskflow" }
tokio-util          = { workspace = true }
tracing             = { workspace = true }
tracing-subscriber  = { workspace = true }
base64              = { workspace = true }
reqwest             = { workspace = true }
serde_json          = { workspace = true }
serde_yaml          = { workspace = true }
humantime           = { workspace = true }
async-trait         = { workspace = true }
